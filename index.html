<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Resume Parser</title>
<style>
  body { background:#0f1117; color:#e6e6e6; font-family: 'Segoe UI', sans-serif; margin:0; padding:30px; }
  h1 { color:#58a6ff; }
  .container { max-width: 950px; margin: auto; }
  input[type=file], input[type=text] { background:#1c1f2b; color:#fff; border:1px solid #333; border-radius:8px; padding:10px; }
  button { background:#1f6feb; color:#fff; border:none; padding:10px 18px; border-radius:8px; font-weight:bold; cursor:pointer; }
  button:hover { background:#388bfd; }
  .card { background:#161b22; border:1px solid #30363d; border-radius:10px; padding:20px; margin-bottom:20px; }
  table { width:100%; border-collapse: collapse; margin-top:10px; }
  td, th { padding:8px; border-bottom:1px solid #30363d; text-align:left; font-size:14px; vertical-align:top; }
  .skill-tag { display:inline-block; background:#1f6feb33; color:#58a6ff; padding:2px 8px; border-radius:12px; margin:2px; font-size:12px; }
</style>
</head>
<body>
<div class="container">
  <h1>📄 Automated Resume Parser</h1>

  <div class="card">
    <h3>Upload a resume (PDF)</h3>
    <form method="POST" action="/upload" enctype="multipart/form-data">
      <input type="file" name="resume" accept=".pdf" required>
      <button type="submit">Upload & Parse</button>
    </form>
  </div>

  <div class="card">
    <h3>Search candidates by skill</h3>
    <form method="GET" action="/">
      <input type="text" name="skill" placeholder="e.g. python" value="{{ skill }}">
      <button type="submit">Search</button>
    </form>
  </div>

  <div class="card">
    <h3>Candidates ({{ candidates|length }})</h3>
    <table>
      <tr><th>Name</th><th>Email</th><th>Phone</th><th>Skills</th><th>Education</th></tr>
      {% for c in candidates %}
      <tr>
        <td>{{ c[2] }}</td>
        <td>{{ c[3] }}</td>
        <td>{{ c[4] }}</td>
        <td>
          {% for s in c[5].split(', ') if s %}
          <span class="skill-tag">{{ s }}</span>
          {% endfor %}
        </td>
        <td>{{ c[6] }}</td>
      </tr>
      {% endfor %}
    </table>
  </div>
</div>
</body>
</html>
